name: run lean-update
on:
  # lean-update アクションのカナリアテストとして使用するため、
  # 存在しないブランチを参照してエラーにならないよう、
  # スケジュールによる自動実行はしない。
  # schedule:
  #   - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update_lean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: run lean-update@main
        uses: leanprover-community/lean-update@rewrite-script
