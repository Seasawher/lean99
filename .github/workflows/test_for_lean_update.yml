name: lean-update canary

run-name: lean-update canary for PR #${{ inputs.source_pr }} ${{ inputs.lean_update_sha }}

on:
  workflow_dispatch:
    inputs:
      lean_update_sha:
        required: true
        type: string

jobs:
  canary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target package
        uses: actions/checkout@v6

      - name: Checkout lean-update under test
        uses: actions/checkout@v6
        with:
          repository: leanprover-community/lean-update
          ref: ${{ inputs.lean_update_sha }}
          path: .github/actions/lean-update-under-test

      - name: Run lean-update under test
        id: lean-update
        uses: ./.github/actions/lean-update-under-test
